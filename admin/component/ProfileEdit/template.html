<div class="updateProfile">
    <form class="updateProfile__form">

        <select class="updateProfile__select" required name="id">
            <option required value="">--Choisir un profil--</option>
            {{optionprofile}}
        </select>
        
        <input class="updateProfile__input" required type="text" name="nom" placeholder="Nom du Profil">

        <select class="updateProfile__select" required name="age_restriction">
            <option value="">--Restriction d'âge--</option>
            <option value="0">Tout public</option>
            <option value="10">10 ans</option>
            <option value="12">12 ans</option>
            <option value="14">14 ans</option>
            <option value="16">16 ans</option>
            <option value="18">18 ans</option>
        </select> 
        
        <input class="updateProfile__button" onclick="{{handler}}" type="button" value="Modifier le profile">

    </form>
</div>
