<div class="addMovie">
    <form class="addMovie__form">
        
        <input class="addMovie__input" required type="text" name="name" placeholder="Titre du film">

        <input class="addMovie__input" required type="text" name="director" placeholder="Réalisateur du film" pattern="[^0-9]*" title="Numbers are not allowed">

        <input class="addMovie__input" required type="number" name="year" placeholder="Année de sortie" min="1895" max="2026">

        <input class="addMovie__input" required type="number" name="length" placeholder="Durée en min" min="1">

        <input class="addMovie__input" required type="text" name="description" placeholder="Description">

        <select class="addMovie__select" required name="id_category">{{optioncategory}}</select>

        <input class="addMovie__input" required type="text" name="image" placeholder="Nom du fichier">

        <input class="addMovie__input" required type="text" name="trailer" placeholder="URL du trailer">

        <select class="addMovie__select" required name="min_age">
            <option value="">--Age minimal--</option>
            <option value="0">Tout public</option>
            <option value="10">10</option>
            <option value="12">12</option>
            <option value="14">14</option>
            <option value="16">16</option>
            <option value="18">18</option>
        
        </select>

        <input class="addMovie__button" onclick="{{handler}}" type="button" value="Ajouter" name="todo">

    </form>
</div>
